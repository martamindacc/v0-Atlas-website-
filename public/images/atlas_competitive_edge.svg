<svg width="100%" viewBox="0 0 680 370" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <radialGradient id="cg1" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#1D9E75" stop-opacity="0.13"/>
      <stop offset="100%" stop-color="#1D9E75" stop-opacity="0"/>
    </radialGradient>
    <radialGradient id="cg2" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#534AB7" stop-opacity="0.11"/>
      <stop offset="100%" stop-color="#534AB7" stop-opacity="0"/>
    </radialGradient>
    <radialGradient id="cg3" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#185FA5" stop-opacity="0.11"/>
      <stop offset="100%" stop-color="#185FA5" stop-opacity="0"/>
    </radialGradient>
  </defs>

  <!-- Background -->
  <rect x="0" y="0" width="680" height="360" fill="#fafafb" rx="12" style="fill:rgb(250, 250, 251);"/>

  <!-- Cluster 1: Prepare -->
  <ellipse cx="150" cy="180" rx="100" ry="90" fill="url(#cg1)" style="stroke:none;opacity:1;"/>
  <circle cx="150" cy="180" r="26" fill="#0F6E56" opacity="0.1" style="fill:rgb(15, 110, 86);"/>
  <circle cx="150" cy="180" r="16" fill="#1D9E75" opacity="0.18" style="fill:rgb(29, 158, 117);"/>
  <circle cx="150" cy="180" r="8" fill="#1D9E75" opacity="0.92" style="fill:rgb(29, 158, 117);"/>

  <!-- Cluster 2: Navigate -->
  <ellipse cx="340" cy="168" rx="110" ry="98" fill="url(#cg2)" style="stroke:none;opacity:1;"/>
  <circle cx="340" cy="168" r="32" fill="#3C3489" opacity="0.09" style="fill:rgb(60, 52, 137);"/>
  <circle cx="340" cy="168" r="20" fill="#534AB7" opacity="0.16" style="fill:rgb(83, 74, 183);"/>
  <circle cx="340" cy="168" r="10" fill="#534AB7" opacity="0.95" style="fill:rgb(83, 74, 183);"/>

  <!-- Cluster 3: Resolve -->
  <ellipse cx="530" cy="180" rx="100" ry="90" fill="url(#cg3)" style="stroke:none;opacity:1;"/>
  <circle cx="530" cy="180" r="26" fill="#0C447C" opacity="0.1" style="fill:rgb(12, 68, 124);"/>
  <circle cx="530" cy="180" r="16" fill="#185FA5" opacity="0.16" style="fill:rgb(24, 95, 165);"/>
  <circle cx="530" cy="180" r="8" fill="#185FA5" opacity="0.92" style="fill:rgb(24, 95, 165);"/>
</svg>
